<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Exporting PDF...</title>
  <style>
    body {
      background-color: #ffffff;
      color: #1f1f1f;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
    }
    #loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      color: #1f1f1f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-left-color: #8ab4f8;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    /* Container where the HTML will be injected for html2pdf to process */
    #pdf-container {
      width: 800px; /* Force a consistent width for the PDF */
      margin: 0 auto;
      background-color: #ffffff;
      color: #1f1f1f;
      padding: 40px 40px 60px 40px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <h2>Generating PDF...</h2>
    <p>Please wait while we prepare your chat export.</p>
    <p>This tab will close automatically when finished.</p>
  </div>

  <div id="pdf-container"></div>

  <script src="html2pdf.bundle.min.js"></script>
  <script src="export.js"></script>
</body>
</html>
