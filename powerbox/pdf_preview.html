<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'self'; img-src 'self' data: https:;">
<title>Powerbox for Gemini — Export Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 13px;
    color: #1a1a2e;
    background: #f9f9fb;
    padding: 0;
  }
  .page {
    max-width: 780px;
    margin: 0 auto;
    padding: 32px 28px 48px;
    background: #fff;
    min-height: 100vh;
  }
  .doc-header {
    border-bottom: 2px solid #e2e8f0;
    padding-bottom: 16px;
    margin-bottom: 24px;
  }
  .doc-title {
    font-size: 22px;
    font-weight: 700;
    color: #0f172a;
    letter-spacing: -0.3px;
    margin-bottom: 6px;
  }
  .doc-meta {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    font-size: 11px;
    color: #64748b;
  }
  .doc-meta span {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .badge-platform {
    background: #eff6ff;
    color: #1d4ed8;
    border: 1px solid #bfdbfe;
  }
  .msg {
    margin-bottom: 18px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #e2e8f0;
    page-break-inside: avoid;
    break-inside: avoid;
  }
  .msg-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .msg-turn {
    font-size: 9px;
    font-weight: 400;
    opacity: 0.6;
    margin-left: auto;
  }
  .msg-u .msg-header { background: #eff6ff; color: #1d4ed8; border-bottom: 1px solid #bfdbfe; }
  .msg-a .msg-header { background: #f0fdf4; color: #16a34a; border-bottom: 1px solid #bbf7d0; }
  .msg-body {
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.65;
    color: #334155;
    white-space: pre-wrap;
    word-break: break-word;
  }
  pre {
    background: #1e293b;
    color: #e2e8f0;
    border-radius: 7px;
    padding: 12px 14px;
    margin: 10px 0;
    overflow-x: auto;
    font-size: 11.5px;
    line-height: 1.5;
    font-family: 'SF Mono', 'Cascadia Code', Consolas, ui-monospace, monospace;
    white-space: pre;
  }
  .code-lang {
    display: block;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #94a3b8;
    margin-bottom: 6px;
  }
  .print-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #0f172a;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    z-index: 999;
  }
  .print-bar-label {
    font-size: 12px;
    color: #94a3b8;
  }
  .print-bar-label strong { color: #e2e8f0; }
  .print-btn {
    background: #a8c7fa;
    color: #1c1b1f;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: filter 0.15s;
  }
  .print-btn:hover { filter: brightness(1.1); }
  .close-btn {
    background: none;
    border: 1px solid #334155;
    color: #94a3b8;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 13px;
    cursor: pointer;
  }
  .loading {
    padding: 48px;
    text-align: center;
    color: #64748b;
    font-size: 14px;
  }
  .error-msg {
    padding: 24px;
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 8px;
    color: #dc2626;
    font-size: 13px;
    margin: 24px;
  }
  @media print {
    .print-bar { display: none !important; }
    body { background: #fff; }
    .page { padding: 20px; }
    pre { white-space: pre-wrap; }
  }
</style>
</head>
<body>

<div class="page" id="page">
  <div class="loading" id="loadingMsg">⏳ Loading chat data&hellip;</div>
</div>

<div class="print-bar" id="printBar" style="display:none">
  <span class="print-bar-label">Ready to export &middot; <strong>File &rarr; Print &rarr; Save as PDF</strong></span>
  <div style="display:flex;gap:8px">
    <button class="close-btn" id="closeBtn">✕ Close</button>
    <button class="print-btn" id="printBtn">🖨️ Save as PDF</button>
  </div>
</div>

<script src="pdf_preview.js"></script>
</body>
</html>
