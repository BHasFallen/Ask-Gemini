<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg: #121212;
      --text: #e0e0e0;
      --accent: #818cf8;
      --muted: #888;
      --border: #2e2e2e;
    }

    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      line-height: 1.4;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .version {
      font-size: 11px;
      color: var(--muted);
    }

    .guide {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .step {
      display: flex;
      gap: 10px;
      font-size: 13px;
    }

    .step-num {
      color: var(--accent);
      font-weight: 700;
      min-width: 14px;
    }

    b {
      color: #fff;
    }

    .footer {
      margin-top: 24px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 11px;
      color: var(--muted);
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    /* Stats Section Styles */
    .value-dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
    }

    .stat-value {
      display: block;
      font-size: 20px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 2px;
      letter-spacing: -0.2px;
    }

    .stat-label {
      display: block;
      font-size: 9px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .ag-popup-rate-btn {
      width: 100%;
      padding: 10px;
      margin-top: 20px;
      background: linear-gradient(135deg, #3d5afe, #651fff) !important;
      border: none !important;
      border-radius: 10px;
      color: #ffffff !important;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .ag-popup-rate-btn:hover {
      background: linear-gradient(135deg, #4d6aff, #7530ff) !important;
      box-shadow: 0 4px 12px rgba(61, 90, 254, 0.3);
      transform: translateY(-1px);
    }
    .ag-popup-rate-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Quote Reply</h1>
    <span class="version" id="version-badge">v2.2.0</span>
  </div>

  <div class="value-dashboard">
    <div class="stat-card">
      <span class="stat-value" id="time-saved">0 mins</span>
      <span class="stat-label">Time Saved</span>
    </div>
    <div class="stat-card">
      <span class="stat-value" id="words-analyzed">0 words</span>
      <span class="stat-label">Words Analyzed</span>
    </div>
  </div>

  <div class="guide">
    <div class="step">
      <span class="step-num">1</span>
      <span><b>Highlight</b> text on Gemini.</span>
    </div>
    <div class="step">
      <span class="step-num">2</span>
      <span>Click the <b>Ask Gemini</b> button.</span>
    </div>
    <div class="step">
      <span class="step-num">3</span>
      <span>Type your reply and hit <b>Enter</b>.</span>
    </div>
  </div>

  <button id="rate-extension-btn" class="ag-popup-rate-btn">
    <span>★ Rate Extension</span>
  </button>

  <div class="footer">
    <a href="#" id="view-logs">View Logs</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
